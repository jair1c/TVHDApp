name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Instalar Gradle directamente (sin necesitar gradlew jar)
      - name: Instalar Gradle 8.6
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      # Instalar Android SDK
      - name: Instalar Android SDK
        uses: android-actions/setup-android@v3

      - name: Aceptar licencias Android
        run: yes | sdkmanager --licenses || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build APK Debug
        run: gradle assemblePhoneDebug --no-daemon --stacktrace

      - name: Mostrar APKs generados
        run: find . -name "*.apk" -type f

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: TVHDApp-debug-${{ github.run_number }}
          path: app/build/outputs/apk/phone/debug/*.apk
          retention-days: 30

  # Job separado para release (solo cuando haces push con tag v1.0, v1.1, etc.)
  release:
    name: Release APK
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Gradle 8.6
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Instalar Android SDK
        uses: android-actions/setup-android@v3

      - name: Aceptar licencias
        run: yes | sdkmanager --licenses || true

      - name: Build APK Release
        run: gradle assemblePhoneRelease --no-daemon

      - name: Crear Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "TV HD App ${{ github.ref_name }}"
          body: |
            ## TV HD App ${{ github.ref_name }}
            APK listo para instalar en Android (teléfono y TV)
          files: app/build/outputs/apk/phone/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
